<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dana's Estate Sales</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

<header class="admin-header">
  <div class="admin-header-inner">
    <a href="store.html" class="admin-back-to-site">← Back to main site</a>
    <div class="admin-header-text">
      <h1 class="admin-title">Site admin</h1>
      <p class="admin-subtitle">Manage store products and public events</p>
    </div>
  </div>
</header>

<main class="admin-main">
  <p class="admin-status" data-admin-status role="status" aria-live="polite"></p>

  <section class="admin-card" data-admin-login-panel>
    <h2>Sign in</h2>
    <form class="admin-form" data-admin-login-form>
      <label class="admin-label">
        Password
        <input type="password" name="password" autocomplete="current-password" required class="admin-input" />
      </label>
      <button type="submit" class="btn admin-btn-primary">Sign in</button>
    </form>
  </section>

  <div class="admin-dashboard" data-admin-dashboard hidden>
    <div class="admin-toolbar">
      <div class="admin-tabs" role="tablist">
        <button type="button" class="admin-tab active" role="tab" aria-selected="true" data-admin-tab="products">Products</button>
        <button type="button" class="admin-tab" role="tab" aria-selected="false" data-admin-tab="events">Events</button>
      </div>
      <button type="button" class="btn admin-btn-ghost" data-admin-logout>Sign out</button>
    </div>

    <section class="admin-panel" data-admin-panel="products">
      <div class="admin-panel-head">
        <h2>Products</h2>
        <button type="button" class="btn" data-admin-new-product>New product</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Id</th>
              <th>Name</th>
              <th>Price</th>
              <th>Category</th>
              <th>Active</th>
              <th></th>
            </tr>
          </thead>
          <tbody data-admin-products-tbody></tbody>
        </table>
      </div>

      <div class="admin-form-card" data-admin-product-form-panel hidden>
        <h3 data-admin-product-form-title>New product</h3>
        <form class="admin-form admin-form-grid" data-admin-product-form>
          <input type="hidden" name="editingId" value="" />
          <label class="admin-label">
            <span class="admin-label-heading">Id (slug)<span class="admin-field-info" title="Unique id used in links and the database. Lowercase letters, numbers, and hyphens only (example: vintage-lamp). Hard to change after the product is created." aria-label="Help: unique id used in links and the database. Lowercase letters, numbers, and hyphens only.">i</span></span>
            <input name="id" required class="admin-input" pattern="[a-z0-9]+(-[a-z0-9]+)*" title="Unique id: lowercase, numbers, hyphens only." />
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Name<span class="admin-field-info" title="The product title shoppers see on the store, in the cart, and on the product page. Use a clear, short name." aria-label="Help: product title shown on the store, cart, and product page.">i</span></span>
            <input name="name" required class="admin-input" title="Product title shown to customers." />
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Description<span class="admin-field-info" title="Longer text on the product detail page: condition, size, brand, what is included, pickup notes, etc." aria-label="Help: longer description on the product page.">i</span></span>
            <textarea name="description" rows="3" class="admin-input" title="Detailed description for the product page."></textarea>
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Price (USD)<span class="admin-field-info" title="Price in US dollars before tax or shipping. This is the amount customers are charged for the item." aria-label="Help: US dollar price before tax or shipping.">i</span></span>
            <input name="price_dollars" type="number" min="0.01" step="0.01" required class="admin-input" placeholder="19.99" title="US dollar amount." />
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Category slug<span class="admin-field-info" title="Short code that groups this product with others in the store (example: furniture). Lowercase letters, numbers, hyphens only. Must line up with your category setup." aria-label="Help: category code, lowercase slug for grouping products.">i</span></span>
            <input name="category_slug" required class="admin-input" pattern="[a-z0-9]+(-[a-z0-9]+)*" title="Category slug: lowercase, numbers, hyphens." />
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Category label<span class="admin-field-info" title="Friendly category name visitors read (example: Furniture). Can use capitals and spaces." aria-label="Help: display name for the category.">i</span></span>
            <input name="category_label" required class="admin-input" title="Category name shown to customers." />
          </label>
          <input type="hidden" name="image_urls_state" value="[]" />
          <label class="admin-label">
            <span class="admin-label-heading">Product images<span class="admin-field-info" title="Photos for the store. Save a new product once, then each file choice uploads immediately (max 20). First photo is the main catalog image." aria-label="Help: product photos; save new products first, then upload.">i</span></span>
            <input name="product_images" type="file" accept="image/*,.heic,.heif" multiple class="admin-input" title="Upload image files from your device." />
          </label>
          <p class="admin-hint" data-admin-image-summary></p>
          <div class="admin-product-previews" data-admin-product-previews aria-label="Photo previews"></div>
          <button type="button" class="btn admin-btn-ghost admin-btn-small" data-admin-clear-images title="Remove all images from this product.">Clear all images</button>
          <label class="admin-label">
            <span class="admin-label-heading">Badge<span class="admin-field-info" title="Short tag on the catalog card, for example Sale or New. Leave empty if you do not want a badge." aria-label="Help: optional short label on catalog cards.">i</span></span>
            <input name="badge" class="admin-input" placeholder="Optional" title="Optional badge text on catalog cards." />
          </label>
          <label class="admin-label">
            <span class="admin-label-heading">Sort order<span class="admin-field-info" title="Numbers control order within a category: lower numbers appear first. Leave at 0 unless you need a custom sort." aria-label="Help: lower numbers list first in the category.">i</span></span>
            <input name="sort_order" type="number" step="1" value="0" class="admin-input" title="Lower numbers sort first within the category." />
          </label>
          <label class="admin-label admin-check">
            <input name="is_active" type="checkbox" checked title="When checked, the product appears in the store. Uncheck to hide without deleting." />
            <span class="admin-label-heading">Active (visible on store)<span class="admin-field-info" title="Checked: product is shown in the store. Unchecked: hidden from shoppers but kept in admin so you can turn it back on." aria-label="Help: visibility in the store.">i</span></span>
          </label>
          <p class="admin-form-status" data-admin-product-status role="status" aria-live="polite"></p>
          <div class="admin-form-actions">
            <button type="submit" class="btn admin-btn-primary">Save</button>
            <button type="button" class="btn admin-btn-ghost" data-admin-product-cancel>Cancel</button>
          </div>
        </form>
      </div>
    </section>

    <section class="admin-panel" data-admin-panel="events" hidden>
      <div class="admin-panel-head">
        <h2>Events</h2>
        <button type="button" class="btn" data-admin-new-event>New event</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Location</th>
              <th>Active</th>
              <th></th>
            </tr>
          </thead>
          <tbody data-admin-events-tbody></tbody>
        </table>
      </div>

      <div class="admin-form-card" data-admin-event-form-panel hidden>
        <h3 data-admin-event-form-title>New event</h3>
        <form class="admin-form admin-form-grid" data-admin-event-form>
          <input type="hidden" name="editingId" value="" />
          <label class="admin-label">Id (slug) <input name="id" required class="admin-input" pattern="[a-z0-9]+(-[a-z0-9]+)*" /></label>
          <label class="admin-label">Starts on (YYYY-MM-DD) <input name="starts_on" required class="admin-input" pattern="\d{4}-\d{2}-\d{2}" /></label>
          <label class="admin-label">Month key (filter) <input name="month_key" required class="admin-input" maxlength="3" pattern="[a-z]{3}" title="e.g. apr" /></label>
          <label class="admin-label">Month label (card) <input name="date_month_label" required class="admin-input" placeholder="Apr" /></label>
          <label class="admin-label">Day <input name="date_day" type="number" min="1" max="31" required class="admin-input" /></label>
          <label class="admin-label">Year <input name="date_year" type="number" min="1900" max="2200" required class="admin-input" /></label>
          <label class="admin-label">Title <input name="title" required class="admin-input" /></label>
          <label class="admin-label">Location <input name="location" required class="admin-input" /></label>
          <label class="admin-label">Schedule <input name="schedule_text" required class="admin-input" /></label>
          <label class="admin-label">Type <input name="event_type" required class="admin-input" /></label>
          <label class="admin-label">Lead <textarea name="lead" rows="4" required class="admin-input"></textarea></label>
          <label class="admin-label">Extras (JSON array of {label, body}) <textarea name="extras_json" rows="6" required class="admin-input admin-textarea-mono"></textarea></label>
          <label class="admin-label">Tags (JSON array of strings) <textarea name="tags_json" rows="3" required class="admin-input admin-textarea-mono"></textarea></label>
          <label class="admin-label">Sort order <input name="sort_order" type="number" step="1" value="0" class="admin-input" /></label>
          <label class="admin-label admin-check">
            <input name="is_active" type="checkbox" checked /> Active (visible on events page)
          </label>
          <div class="admin-form-actions">
            <button type="submit" class="btn admin-btn-primary">Save</button>
            <button type="button" class="btn admin-btn-ghost" data-admin-event-cancel>Cancel</button>
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<script src="admin.js"></script>
</body>
</html>
